<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOTES - APP</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <script src="editnote.js" defer></script>
</head>

<body>
    <header>
        <div class="container m-3 mx-auto">
            <div class="row">
                <div class="col m-3 mx-auto ">
                    <h1 class="text-center border p-3 rounded-3">NOTES - APP</h1>
                </div>
            </div>
            <hr>
        </div>
    </header>
    <main>
        <div class="container">
            <div class="row">
                <div class="col">
                    <div class="form-floating ">
                        <textarea class="form-control bg-dark text-white" placeholder="" id="note-text"
                            style="height: 100px"></textarea>
                        <label for="floatingTextarea2">WRITE A NOTE</label>
                    </div>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col">
                    <button class="btn btn-primary w-100" id="note-btn">Add-Note</button>
                </div>
            </div>
            <hr>
        </div>
        <section>
            <div class="container">
                <div class="row" id="display-note">
                    <!-- NOTE RENDER HERE THROUGH JS -->

                    
                </div>
            </div>
        </section>
    </main>



    <script src="bootstrap.min.js"></script>
</body>

</html>
